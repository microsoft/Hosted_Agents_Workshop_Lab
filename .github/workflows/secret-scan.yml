name: Secret Scan (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Lightweight Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan changed files for high-risk secret patterns
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ github.base_ref }}" ]; then
            echo "No base ref provided; skipping scan."
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}"

          changed_files=$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD")

          if [ -z "$changed_files" ]; then
            echo "No changed files to scan."
            exit 0
          fi

          # Focus on source and config-like files; skip common generated/binary paths.
          scoped_files=$(echo "$changed_files" | grep -E '\.(cs|ps1|psm1|sh|yml|yaml|json|md|env|http|txt)$' || true)

          if [ -z "$scoped_files" ]; then
            echo "No eligible text files to scan."
            exit 0
          fi

          echo "Scanning files:"
          echo "$scoped_files"

          secret_pattern='(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}|AIza[0-9A-Za-z\-_]{35}|-----BEGIN (RSA|OPENSSH|EC|DSA|PGP) PRIVATE KEY-----|xox[baprs]-[A-Za-z0-9-]{10,}|(?i)(api[_-]?key|secret|token|password|connectionstring)\s*[:=]\s*["'"'"'][^"'"'"'\r\n]{10,}["'"'"'])'

          if grep -RInE --binary-files=without-match --exclude-dir=.git --exclude-dir=node_modules --exclude=package-lock.json --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.webp' "$secret_pattern" $scoped_files; then
            echo "Potential secret detected in changed files. Remove, rotate, and use placeholders or secret stores."
            exit 1
          fi

          echo "No high-risk secret patterns detected in changed files."
